schema_version: "1.0.0"
pipeline_mode: "treeiso_leafwood"
input:
  path: "/home/matheuspimenta/euc/projeto_eucalipto/talhao_62_25x25.las"
  format: "auto"
output:
  output_dir: "results/canoa/treeiso_leafwood"
  cloud_format: "laz"
runtime:
  docker_compose_profile: "treeiso_leafwood"
  use_gpu: true
  retries: 0
failure_policy:
  on_isolation_error: "abort"
  on_segmentation_error: "abort"
  on_metrics_error: "mark_partial"
providers:
  treeiso:
    tree_id_dim: "final_segs"
    force_python_cut_pursuit: true
    pre_filter_enabled: true
    pre_filter_dim: "classification"
    pre_filter_ground_value: 2
  leafwood:
    # Model checkpoint - options:
    # - "/project/model_weights/weights_randlanet.pth" (default, balanced)
    # - "/project/model_weights/weights_kpconv.pth" (better for sparse/occluded data)
    # - "/project/model_weights/weights_pointtransformer.pth" (newest, slower)
    model_ckpt: "/project/model_weights/weights_randlanet.pth"
    
    # Model name - must match the checkpoint architecture
    # Options: "RandLANet", "KPConv", "PointTransformer"
    model_name: "RandLANet"
    
    # Voxel grid size for downsampling (in meters)
    # Smaller = more detail (slower), Larger = faster but coarser
    # Recommended values:
    # - 0.01: very dense clouds with fine details
    # - 0.02: standard/normal clouds (default)
    # - 0.03-0.04: sparse/occluded clouds with poor quality data
    # - 0.05: very sparse clouds
    grid_size: 0.03
    
    docker_subdir: "docker"
    docker_service: "open3dml"
    device: "cuda"
    batch_size: 1
  
  metrics:
    wood_density_kg_m3: 900.0

